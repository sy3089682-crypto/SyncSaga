version: "3.8"

services:
  # ─── Database ───
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: syncsaga
      POSTGRES_PASSWORD: syncsaga
      POSTGRES_DB: syncsaga
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncsaga"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Cache & Pub/Sub ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  # ─── Vector Database ───
  qdrant:
    image: qdrant/qdrant:v1.9
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ─── Backend API ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://syncsaga:syncsaga@postgres:5432/syncsaga
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  # ─── AI Service ───
  ai-service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - FAISS_INDEX_PATH=/data/indexes/fingerprint.index
    volumes:
      - ./data:/data
    depends_on:
      - redis
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── Celery Workers ───
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.sync_worker worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://syncsaga:syncsaga@postgres:5432/syncsaga
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/data
    depends_on:
      - redis
      - postgres
      - qdrant

  # ─── Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_AI_URL=http://ai-service:8001
      - NEXT_PUBLIC_WS_URL=http://backend:8000
    depends_on:
      - backend

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
