apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syncsaga-ingress
  namespace: syncsaga
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400s"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400s"
spec:
  tls:
    - hosts:
        - syncsaga.app
        - api.syncsaga.app
      secretName: syncsaga-tls
  rules:
    - host: syncsaga.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syncsaga-web
                port:
                  number: 3000
    - host: api.syncsaga.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syncsaga-api
                port:
                  number: 4000
