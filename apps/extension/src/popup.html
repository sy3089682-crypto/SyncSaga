<!DOCTYPE html>
<html>
<head>
  <title>SyncSaga</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-light: #1a1a25;
      --border: #2a2a3a;
      --primary: #8b5cf6;
      --text: #f8fafc;
      --text-secondary: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 400px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    h1 {
      font-size: 18px;
      background: linear-gradient(135deg, var(--primary), #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.connected { background: #10b981; }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-light);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #7c3aed; }
    button.danger {
      background: #ef4444;
    }
    button.danger:hover { background: #dc2626; }
    .info {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .video-detected {
      padding: 8px 12px;
      background: #10b98120;
      border: 1px solid #10b98140;
      border-radius: 8px;
      font-size: 12px;
      color: #10b981;
      margin-bottom: 12px;
      display: none;
    }
    .video-detected.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>SyncSaga</h1>
  </div>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="video-detected" id="videoDetected">
    ✓ Video player detected on this page
  </div>

  <div class="input-group">
    <label>Room ID</label>
    <input type="text" id="roomId" placeholder="Enter room ID..." />
  </div>

  <div class="input-group">
    <label>Token</label>
    <input type="password" id="token" placeholder="Your auth token" />
  </div>

  <button id="connectBtn">Connect to Room</button>
  <button id="disconnectBtn" class="danger" style="margin-top: 8px; display: none;">Disconnect</button>

  <script src="popup.js"></script>
</body>
</html>
