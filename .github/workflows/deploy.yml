name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build API
        run: npx turbo run build --filter=@syncsaga/api

      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_API_KEY }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }} \
            --build-env NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-env NEXT_PUBLIC_LIVEKIT_URL="${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}" \
            --build-env NEXT_PUBLIC_API_URL="https://syncsaga-api.onrender.com" \
            --build-env NEXT_PUBLIC_SOCKET_URL="https://syncsaga-api.onrender.com"
        working-directory: apps/web
