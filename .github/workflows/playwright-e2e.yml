name: Playwright E2E Tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  SUPABASE_URL: https://test.supabase.co
  SUPABASE_SERVICE_KEY: test-service-key
  JWT_SECRET: test-jwt-secret-with-at-least-32-chars!!
  JWT_REFRESH_SECRET: test-refresh-secret-with-at-least-32-chars!!
  CORS_ORIGIN: http://127.0.0.1:3000
  LOG_LEVEL: error
  NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
  NEXT_PUBLIC_SOCKET_URL: http://127.0.0.1:4000

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build shared packages
        run: npx turbo run build --filter=@syncsaga/config --filter=@syncsaga/types
        env:
          REDIS_URL: redis://127.0.0.1:6379

      - name: Start API server
        run: |
          npx tsx apps/api/src/index.ts &
          echo "API_PID=$!"
          sleep 3
          curl -s http://127.0.0.1:4000/health || echo "API health check failed"
        env:
          REDIS_URL: redis://127.0.0.1:6379

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          REDIS_URL: redis://127.0.0.1:6379

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 14
