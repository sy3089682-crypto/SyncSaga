services:
  - type: web
    name: SyncSaga
    env: node
    region: oregon
    plan: free
    branch: master
    buildCommand: npm install && npx turbo run build --filter=@syncsaga/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
