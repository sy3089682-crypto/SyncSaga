apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncsaga-web
  namespace: syncsaga
  labels:
    app: syncsaga-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: syncsaga-web
  template:
    metadata:
      labels:
        app: syncsaga-web
    spec:
      containers:
        - name: web
          image: ghcr.io/sy3089682-crypto/syncsaga-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.syncsaga.app"
            - name: NEXT_PUBLIC_SOCKET_URL
              value: "https://api.syncsaga.app"
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: syncsaga-secrets
                  key: supabase-url
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: syncsaga-secrets
                  key: supabase-anon-key
            - name: NEXT_PUBLIC_LIVEKIT_URL
              valueFrom:
                secretKeyRef:
                  name: syncsaga-secrets
                  key: livekit-url
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: syncsaga-web
  namespace: syncsaga
spec:
  selector:
    app: syncsaga-web
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: syncsaga-web
  namespace: syncsaga
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: syncsaga-web
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
